<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Temp Mail</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;font-family:Arial,sans-serif;min-height:100vh;
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  color:#fff;padding:15px;
}
.box{
  max-width:520px;margin:auto;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:18px;
}
h2{text-align:center}
.mail{
  background:#020617;border:1px solid #334155;padding:15px;
  border-radius:14px;text-align:center;font-weight:bold;word-break:break-all;
}
button{
  width:100%;padding:13px;margin-top:10px;border:0;border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  color:white;font-weight:bold;cursor:pointer;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item{
  margin-top:12px;background:#0f172a;border:1px solid #334155;
  border-radius:14px;padding:12px;
}
.subject{color:#38bdf8;font-weight:bold}
.small{font-size:13px;color:#cbd5e1;margin-top:5px}
.body{
  background:#fff;color:#111;padding:12px;border-radius:12px;
  margin-top:10px;max-height:320px;overflow:auto;
}
.status{text-align:center;color:#facc15;margin-top:12px}
</style>
</head>

<body>
<div class="box">
  <h2>📩 Temp Mail Inbox</h2>

  <div class="mail" id="emailBox">No email created</div>

  <div class="grid">
    <button onclick="createMail()">Create Mail</button>
    <button onclick="copyMail()">Copy Mail</button>
  </div>

  <div class="grid">
    <button onclick="loadInbox()">Refresh</button>
    <button onclick="deleteMail()">Delete</button>
  </div>

  <div class="status" id="status"></div>
  <div id="inbox"></div>
</div>

<script>
const TOKEN = "1297|Ay7NJEDVQJUieYgwG8NB38wZiqGcfu4LiJcN11cMd7a7c495";
const BASE = "https://api.tempmail.co/v1";

let currentEmail = localStorage.getItem("temp_mail") || "";

const headers = {
  "Authorization": "Bearer " + TOKEN,
  "Accept": "application/json",
  "Content-Type": "application/json"
};

if(currentEmail){
  document.getElementById("emailBox").innerText = currentEmail;
  loadInbox();
}

function status(text){
  document.getElementById("status").innerText = text;
}

async function api(path, method="GET"){
  const res = await fetch(BASE + path, {
    method: method,
    headers: headers
  });

  if(!res.ok){
    throw new Error("API Error: " + res.status);
  }

  if(res.status === 204) return {};
  return await res.json();
}

async function createMail(){
  status("Creating mail...");
  document.getElementById("inbox").innerHTML = "";

  try{
    const data = await api("/addresses", "POST");

    const email = data?.data?.email || data?.email;

    if(email){
      currentEmail = email;
      localStorage.setItem("temp_mail", currentEmail);
      document.getElementById("emailBox").innerText = currentEmail;
      status("Email created ✅");
      loadInbox();
    }else{
      status("Create failed ❌");
      console.log(data);
    }
  }catch(err){
    status("API/CORS error ❌");
    console.error(err);
  }
}

function copyMail(){
  if(!currentEmail){
    status("No email found");
    return;
  }

  navigator.clipboard.writeText(currentEmail);
  status("Email copied ✅");
}

async function loadInbox(){
  if(!currentEmail){
    status("Create mail first");
    return;
  }

  status("Checking inbox...");

  try{
    const data = await api("/addresses/" + encodeURIComponent(currentEmail) + "/emails");
    const emails = data?.data || data || [];
    const inbox = document.getElementById("inbox");
    inbox.innerHTML = "";

    if(!Array.isArray(emails) || emails.length === 0){
      status("No mail received yet");
      return;
    }

    status("Inbox loaded ✅");

    emails.forEach(mail=>{
      const uuid = mail.uuid || mail.id;
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="subject">${mail.subject || "No Subject"}</div>
        <div class="small">From: ${mail.from || mail.sender || ""}</div>
        <div class="small">Time: ${mail.created_at || mail.date || ""}</div>
        <button onclick="readMail('${uuid}', this)">Open Mail</button>
        <div class="body" style="display:none"></div>
      `;

      inbox.appendChild(div);
    });

  }catch(err){
    status("Inbox load failed ❌");
    console.error(err);
  }
}

async function readMail(uuid, btn){
  btn.innerText = "Loading...";

  try{
    const data = await api("/emails/" + encodeURIComponent(uuid));
    const mail = data?.data || data;

    const body = btn.nextElementSibling;
    body.style.display = "block";
    body.innerHTML = mail.body || mail.html || mail.text || "No body found";

    btn.innerText = "Opened ✅";
  }catch(err){
    btn.innerText = "Failed ❌";
    console.error(err);
  }
}

async function deleteMail(){
  if(!currentEmail){
    status("No email found");
    return;
  }

  try{
    await api("/addresses/" + encodeURIComponent(currentEmail), "DELETE");

    localStorage.removeItem("temp_mail");
    currentEmail = "";
    document.getElementById("emailBox").innerText = "No email created";
    document.getElementById("inbox").innerHTML = "";
    status("Deleted ✅");

  }catch(err){
    status("Delete failed ❌");
    console.error(err);
  }
}
</script>
</body>
</html>
