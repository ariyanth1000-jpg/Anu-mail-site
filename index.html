<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Temp Mail</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;min-height:100vh;background:#020617;color:white;padding:15px}
.box{max-width:520px;margin:auto;background:#0f172a;border:1px solid #334155;border-radius:20px;padding:18px}
h2{text-align:center}
.mail{background:#020617;border:1px solid #334155;padding:15px;border-radius:14px;text-align:center;font-weight:bold;word-break:break-all}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;padding:13px;margin-top:10px;border:0;border-radius:12px;background:#2563eb;color:white;font-weight:bold}
.item{margin-top:12px;background:#111827;border:1px solid #334155;border-radius:14px;padding:12px}
.subject{color:#38bdf8;font-weight:bold}
.small{font-size:13px;color:#cbd5e1;margin-top:5px}
.body{background:white;color:#111;padding:12px;border-radius:12px;margin-top:10px;max-height:320px;overflow:auto}
.status{text-align:center;color:#facc15;margin-top:12px}
</style>
</head>
<body>

<div class="box">
  <h2>💌 ANU GMAIL CENTER</h2>
  <div class="mail" id="emailBox">No email created</div>

  <div class="grid">
    <button onclick="createMail()">✍🏼 Create</button>
    <button onclick="copyMail()">⧉ Copy</button>
  </div>

  <div class="grid">
    <button onclick="loadInbox()">⏳ Refresh</button>
    <button onclick="deleteMail()">🗑 Delete</button>
  </div>

  <div class="status" id="status"></div>
  <div id="inbox"></div>
</div>

<script>
const API = "/api/tempmail";
let currentEmail = localStorage.getItem("temp_mail") || "";

if(currentEmail){
  emailBox.innerText = currentEmail;
  loadInbox();
}

setInterval(()=>{
  if(currentEmail){
    loadInbox();
  }
},10000);

function status(t){ document.getElementById("status").innerText = t; }

async function api(action, params=""){
  const res = await fetch(API + "?action=" + action + params);
  return await res.json();
}

function getOTP(text){
  const match = String(text || "").match(/\b\d{4,8}\b/);
  return match ? match[0] : "";
}

function copyOTP(code){
  navigator.clipboard.writeText(code);
  status("OTP copied ✅");
}

async function createMail(){
  status("Creating mail...");
  inbox.innerHTML = "";
  try{
    const data = await api("create");
    const email = data?.data?.email || data?.email;
    if(email){
      currentEmail = email;
      localStorage.setItem("temp_mail", email);
      emailBox.innerText = email;
      status("Email created ✅");
      loadInbox();
    }else{
      status("Create failed ❌");
      console.log(data);
    }
  }catch(e){ status("Server/API error ❌"); }
}

function copyMail(){
  if(!currentEmail) return status("No email found");
  navigator.clipboard.writeText(currentEmail);
  status("Email copied ✅");
}

async function loadInbox(){
  if(!currentEmail) return status("Create mail first");
  status("Checking inbox...");
  try{
    const data = await api("inbox", "&email=" + encodeURIComponent(currentEmail));
    const emails = data?.data || data || [];
    inbox.innerHTML = "";

    if(!Array.isArray(emails) || emails.length === 0){
      return status("No mail received yet");
    }

    status("📦 Inbox loaded (10s) ⏱");

    emails.forEach(mail=>{
      const uuid = mail.uuid || mail.id;
      const otp = getOTP(mail.subject || "");
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div class="subject">${mail.subject || "No Subject"}</div>
        <div class="small">From: ${mail.from || mail.sender || ""}</div>
        <div class="small">Time: ${mail.created_at || mail.date || ""}</div>

        <div class="grid">
          ${
            otp
            ? `<button onclick="copyOTP('${otp}')" style="background:#16a34a">OTP: ${otp}</button>`
            : `<button disabled style="background:#334155">No OTP</button>`
          }
          <button onclick="readMail('${uuid}', this)">Open Mail</button>
        </div>

        <div class="body" style="display:none"></div>
      `;
      inbox.appendChild(div);
    });
  }catch(e){ status("Inbox load failed ❌"); }
}

async function readMail(uuid, btn){
  btn.innerText = "Loading...";
  try{
    const data = await api("read", "&uuid=" + encodeURIComponent(uuid));
    const mail = data?.data || data;
    const body = btn.parentElement.nextElementSibling;
    body.style.display = "block";
    body.innerHTML = mail.body || mail.html || mail.text || "No body found";
    btn.innerText = "Opened ✅";
  }catch(e){ btn.innerText = "Failed ❌"; }
}

async function deleteMail(){
  if(!currentEmail) return status("No email found");
  try{
    await api("delete", "&email=" + encodeURIComponent(currentEmail));
    localStorage.removeItem("temp_mail");
    currentEmail = "";
    emailBox.innerText = "No email created";
    inbox.innerHTML = "";
    status("Deleted ✅");
  }catch(e){ status("Delete failed ❌"); }
}
</script>

</body>
</html>
