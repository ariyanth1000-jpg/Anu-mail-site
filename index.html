<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anu mail Site</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  padding:15px;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  color:white;
}

.box{
  max-width:540px;
  margin:auto;
  padding:18px;
  border-radius:22px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
}

h1{
  text-align:center;
  margin:5px 0 20px;
  font-size:36px;
  background:linear-gradient(90deg,#22c55e,#38bdf8,#facc15,#f472b6);
  -webkit-background-clip:text;
  color:transparent;
}

.mail{
  background:#020617;
  border:1px solid #334155;
  padding:16px;
  border-radius:16px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  word-break:break-all;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

button{
  padding:14px;
  border:0;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:active{transform:scale(.97)}

.deleteBtn{background:linear-gradient(135deg,#dc2626,#ef4444)}
.copyBtn{background:linear-gradient(135deg,#16a34a,#22c55e)}

.info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.badge{
  background:#020617;
  border:1px solid #334155;
  padding:10px;
  border-radius:13px;
  text-align:center;
  color:#cbd5e1;
}

.item{
  margin-top:12px;
  padding:13px;
  background:#0f172a;
  border:1px solid #334155;
  border-radius:16px;
}

.subject{
  color:#38bdf8;
  font-size:18px;
  font-weight:bold;
}

.small{
  margin-top:6px;
  color:#cbd5e1;
  font-size:13px;
}

.mailBtns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.body{
  display:none;
  margin-top:10px;
  padding:12px;
  background:white;
  color:#111;
  border-radius:12px;
  max-height:320px;
  overflow:auto;
}

.status{
  text-align:center;
  margin-top:14px;
  color:#facc15;
  font-size:18px;
  word-break:break-word;
}

.loader{
  display:none;
  width:32px;
  height:32px;
  border:4px solid #334155;
  border-top:4px solid #38bdf8;
  border-radius:50%;
  margin:14px auto 0;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="box">
  <h1>Anu mail Site</h1>

  <div class="mail" id="emailBox">No email created</div>

  <div class="grid">
    <button type="button" onclick="safeClick('createMail')">Create Mail</button>
    <button type="button" onclick="safeClick('copyMail')">Copy Mail</button>
  </div>

  <div class="grid">
    <button type="button" onclick="safeClick('loadInbox')">Refresh</button>
    <button type="button" class="deleteBtn" onclick="safeClick('deleteMail')">Delete</button>
  </div>

  <div class="info">
    <div class="badge" id="mailCount">Inbox: 0</div>
    <div class="badge">Auto: 5s</div>
  </div>

  <div class="loader" id="loader"></div>
  <div class="status" id="status">Ready ✅</div>
  <div id="inbox"></div>
</div>

<script>
function showReason(msg){
  const s=document.getElementById("status");
  if(s) s.innerText=msg;
  console.error(msg);
}

function safeClick(fnName){
  try{
    if(typeof window[fnName] !== "function"){
      showReason("Button not working ❌ Reason: script.js load হয়নি বা "+fnName+" function পাওয়া যায়নি");
      return;
    }
    window[fnName]();
  }catch(err){
    showReason("Button error ❌ Reason: "+err.message);
  }
}

window.addEventListener("error",function(e){
  showReason("Script error ❌ Reason: "+e.message);
});
</script>

<script src="script.js"
onload="document.getElementById('status').innerText='Script loaded ✅';"
onerror="document.getElementById('status').innerText='script.js load হয়নি ❌ ফাইলের নাম/location চেক করুন';">
</script>

</body>
</html>
